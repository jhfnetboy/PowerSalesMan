<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PowerSalesMan</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --line: #2a2f3a;
    --text: #e6e9ef; --muted: #8a91a0; --accent: #4f8cff; --good: #34c77b;
    --warn: #f2b134; --bad: #ef5b5b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "Segoe UI", "PingFang SC", "Sarabun", sans-serif; }
  header { padding: 14px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; }
  h1 span { color: var(--muted); font-weight: 400; font-size: 13px; }
  .stat { color: var(--muted); font-size: 13px; }
  .stat b { color: var(--text); }
  .pill { padding: 2px 8px; border-radius: 99px; font-size: 12px; }
  .pill.on { background: rgba(52,199,123,.15); color: var(--good); }
  .pill.off { background: rgba(242,177,52,.15); color: var(--warn); }
  .pill.role { background: rgba(79,140,255,.15); color: var(--accent); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 6px;
    padding: 7px 12px; font-size: 13px; cursor: pointer; }
  button.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }
  button:hover { filter: brightness(1.1); }
  select.lang { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 8px; }
  main { display: flex; height: calc(100vh - 61px); }
  .list { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 14px; border-bottom: 1px solid var(--line); }
  th { position: sticky; top: 0; background: var(--panel); color: var(--muted);
    font-weight: 500; font-size: 12px; z-index: 1; }
  tr.row { cursor: pointer; }
  tr.row:hover { background: var(--panel); }
  tr.row.sel { background: var(--panel2); }
  .score { display: inline-block; min-width: 34px; text-align: center; padding: 1px 6px;
    border-radius: 5px; font-variant-numeric: tabular-nums; font-weight: 600; }
  .t { color: var(--muted); font-size: 12px; }
  aside { width: 420px; border-left: 1px solid var(--line); background: var(--panel);
    overflow: auto; padding: 20px; }
  aside.empty { color: var(--muted); display: flex; align-items: center; justify-content: center; }
  label { display: block; color: var(--muted); font-size: 12px; margin: 12px 0 4px; }
  input, select, textarea { width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; font: inherit; }
  textarea { resize: vertical; min-height: 54px; }
  .assess { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px; margin: 14px 0; }
  .assess .big { font-size: 22px; font-weight: 700; }
  .contact { background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 8px 10px; margin: 6px 0; display: flex; justify-content: space-between; gap: 8px; }
  .contact small { color: var(--muted); }
  .del { background: transparent; color: var(--bad); padding: 2px 6px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .rowbtns { display: flex; gap: 8px; margin-top: 16px; }
  .msg { color: var(--good); font-size: 12px; margin-left: 8px; }
  /* overlay (login + admin modal) */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
    align-items: center; justify-content: center; z-index: 10; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 28px; width: 380px; max-width: 92vw; }
  .card h2 { margin: 0 0 4px; }
  .card .sub { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .card.wide { width: 620px; max-height: 82vh; overflow: auto; }
  .err { color: var(--bad); font-size: 13px; margin-top: 10px; min-height: 18px; }
  .code { background: var(--bg); border: 1px dashed var(--good); color: var(--good);
    border-radius: 6px; padding: 10px; font-family: ui-monospace, monospace; word-break: break-all; }
  .hidden { display: none !important; }
  .topbtns { margin-left: auto; display: flex; gap: 8px; align-items: center; }
</style>
</head>
<body>

<!-- 登陆遮罩 -->
<div id="login" class="overlay">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 id="login-title">PowerSalesMan</h2>
      <select class="lang" id="login-lang"></select>
    </div>
    <div class="sub" id="login-sub"></div>
    <input id="login-pw" type="password" autofocus />
    <div style="margin-top:14px"><button id="login-btn" style="width:100%"></button></div>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app" class="hidden">
  <header>
    <h1>PowerSalesMan <span id="subtitle"></span></h1>
    <div class="stat"><span id="l-leads"></span> <b id="s-total">–</b></div>
    <div class="stat"><span id="l-scored"></span> <b id="s-scored">–</b></div>
    <div class="stat"><span id="l-contacts"></span> <b id="s-contacts">–</b></div>
    <div id="s-ai" class="pill off">AI: –</div>
    <div class="topbtns">
      <select class="lang" id="app-lang"></select>
      <span id="s-role" class="pill role"></span>
      <button id="btn-admin" class="ghost hidden"></button>
      <button id="score-all"></button>
      <button id="btn-logout" class="ghost"></button>
    </div>
  </header>
  <main>
    <div class="list">
      <table>
        <thead><tr>
          <th id="th-intent"></th><th id="th-success"></th><th id="th-type"></th>
          <th id="th-name"></th><th id="th-area"></th><th id="th-contacts"></th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <aside id="detail" class="empty"></aside>
  </main>
</div>

<!-- 管理员:销售授权码面板 -->
<div id="admin" class="overlay hidden">
  <div class="card wide">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 id="grants-title"></h2>
      <button class="ghost" id="grants-close"></button>
    </div>
    <div class="assess">
      <div class="grid2">
        <input id="g-label" />
        <input id="g-days" type="number" min="1" value="7" />
      </div>
      <button style="margin-top:8px" id="g-create"></button>
      <div id="g-code-box" class="hidden" style="margin-top:10px">
        <div class="t" id="g-code-once"></div>
        <div class="code" id="g-code"></div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th id="gc-label"></th><th id="gc-expires"></th><th id="gc-status"></th><th></th>
      </tr></thead>
      <tbody id="grant-rows"></tbody>
    </table>
  </div>
</div>

    buyIntent: "ความตั้งใจซื้อ", successRate: "โอกาสสำเร็จ", model: "โมเดล", notScored: "ยังไม่ให้คะแนน — กด ให้คะแนนใหม่",

    stActive: "ใช้งานได้", stRevoked: "ยกเลิกแล้ว", stExpired: "หมดอายุ", noGrants: "ยังไม่มีรหัส",
    type_coworking: "โคเวิร์กกิ้ง", type_university: "มหาวิทยาลัย", type_software_company: "บริษัทซอฟต์แวร์", type_agency: "เอเจนซี", type_community: "คอมมูนิตี้", type_other: "อื่นๆ",
    status_new: "ใหม่", status_enriched: "เติมข้อมูลแล้ว", status_scored: "ให้คะแนนแล้ว", status_contacted: "ติดต่อแล้ว", status_won: "ปิดการขาย", status_lost: "เสียโอกาส",
    ch_call: "โทร", ch_visit: "เข้าพบ", ch_line: "Line", ch_email: "อีเมล",
  },
};
const LANGS = [["en","English"],["zh","中文"],["th","ไทย"]];
let LANG = localStorage.getItem("psm_lang") || "en";
const t = (k) => (DICT[LANG] && DICT[LANG][k]) || DICT.en[k] || k;

// ---------- helpers ----------
const $ = (id) => document.getElementById(id);
const chColor = (v) => v == null ? "#333" : v >= 65 ? "var(--good)" : v >= 40 ? "var(--warn)" : "var(--bad)";
function esc(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML; }
const val = (id) => $(id).value.trim() || null;
let selected = null, ROLE = null;

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (r.status === 401) { showLogin(); throw new Error("unauth"); }
  return r;
}

// ---------- language switch ----------
function fillLangSelects() {
  for (const selId of ["login-lang","app-lang"]) {
    const s = $(selId);
    s.innerHTML = LANGS.map(([v,n]) => '<option value="'+v+'"'+(v===LANG?" selected":"")+'>'+n+'</option>').join("");
    s.onchange = () => setLang(s.value);
  }
}
function setLang(l) {
  LANG = l; localStorage.setItem("psm_lang", l);
  document.documentElement.lang = l;
  fillLangSelects();
  applyStaticText();
  if (!$("app").classList.contains("hidden")) { loadList(); if (selected) openDetail(selected); }
}
function applyStaticText() {
  $("subtitle").textContent = t("subtitle");
  $("l-leads").textContent = t("leads"); $("l-scored").textContent = t("scored"); $("l-contacts").textContent = t("contacts");
  $("score-all").textContent = t("scoreAll"); $("btn-logout").textContent = t("logout"); $("btn-admin").textContent = t("manage");
  $("th-intent").textContent = t("thIntent"); $("th-success").textContent = t("thSuccess"); $("th-type").textContent = t("thType");
  $("th-name").textContent = t("thName"); $("th-area").textContent = t("thArea"); $("th-contacts").textContent = t("thContacts");
  $("login-sub").textContent = t("loginSub"); $("login-pw").placeholder = t("pwPlaceholder"); $("login-btn").textContent = t("loginBtn");
  if ($("detail").classList.contains("empty")) $("detail").textContent = t("detailHint");
  // admin modal
  $("grants-title").textContent = t("grantsTitle"); $("grants-close").textContent = t("close");
  $("g-label").placeholder = t("labelPh"); $("g-days").placeholder = t("daysPh"); $("g-create").textContent = t("create");
  $("gc-label").textContent = t("colLabel"); $("gc-expires").textContent = t("colExpires"); $("gc-status").textContent = t("colStatus");
  if ($("s-role").textContent) $("s-role").textContent = t("role_" + ROLE);
}

// ---------- login ----------
function showLogin() { $("login").classList.remove("hidden"); $("app").classList.add("hidden"); $("login-pw").focus(); }
async function doLogin() {
  $("login-err").textContent = "";
  const r = await fetch("/api/login", { method: "POST", headers: {"content-type":"application/json"},
    body: JSON.stringify({ password: $("login-pw").value }) });
  if (!r.ok) { $("login-err").textContent = t("loginWrong"); return; }
  $("login-pw").value = "";
  await enterApp();
}
$("login-btn").onclick = doLogin;
$("login-pw").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

async function enterApp() {
  const me = await fetch("/api/me").then(r => r.ok ? r.json() : null);
  if (!me) return showLogin();
  ROLE = me.role;
  $("login").classList.add("hidden"); $("app").classList.remove("hidden");
  $("s-role").textContent = t("role_" + ROLE);
  $("btn-admin").classList.toggle("hidden", ROLE !== "admin");
  applyStaticText();
  loadStats(); loadList();
}
$("btn-logout").onclick = async () => { await fetch("/api/logout", { method: "POST" }); selected = null; showLogin(); };

// ---------- data ----------
async function loadStats() {
  const s = await api("/api/stats").then(r => r.json());
  $("s-total").textContent = s.total; $("s-scored").textContent = s.scored; $("s-contacts").textContent = s.contacts;
  const ai = $("s-ai"); ai.textContent = "AI: " + s.ai_model; ai.className = "pill " + (s.ai_enabled ? "on" : "off");
}
async function loadList() {
  const rows = await api("/api/companies").then(r => r.json());
  const tb = $("rows"); tb.innerHTML = "";
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.className = "row" + (selected === r.id ? " sel" : "");
    tr.onclick = () => openDetail(r.id);
    const intent = r.intent_score == null ? "–" : r.intent_score;
    const succ = r.success_probability == null ? "–" : r.success_probability;
    tr.innerHTML =
      '<td><span class="score" style="background:'+chColor(r.intent_score)+'22;color:'+chColor(r.intent_score)+'">'+intent+'</span></td>' +
      '<td><span class="score" style="background:'+chColor(r.success_probability)+'22;color:'+chColor(r.success_probability)+'">'+succ+'</span></td>' +
      '<td class="t">'+esc(t("type_"+r.type))+'</td>' +
      '<td>'+esc(r.name)+'</td>' +
      '<td class="t">'+esc(r.area)+'</td>' +
      '<td class="t">'+r.contacts_count+'</td>';
    tb.appendChild(tr);
  }
}

const TYPES = ["coworking","university","software_company","agency","community","other"];
const STATUSES = ["new","enriched","scored","contacted","won","lost"];

async function openDetail(id) {
  selected = id;
  const d = await api("/api/companies/" + id).then(r => r.json());
  const c = d.company, a = d.assessment;
  const aside = $("detail"); aside.className = "";
  const opts = (arr, cur, pre) => arr.map(v => '<option value="'+v+'"'+(v===cur?" selected":"")+'>'+esc(t(pre+v))+'</option>').join("");
  aside.innerHTML =
    '<label>'+t("fName")+'</label><input id="f-name" value="'+esc(c.name)+'">' +
    '<div class="grid2"><div><label>'+t("fType")+'</label><select id="f-type">'+opts(TYPES,c.type,"type_")+'</select></div>' +
    '<div><label>'+t("fStatus")+'</label><select id="f-status">'+opts(STATUSES,c.status,"status_")+'</select></div></div>' +
    '<div class="grid2"><div><label>'+t("fArea")+'</label><input id="f-area" value="'+esc(c.area)+'"></div>' +
    '<div><label>'+t("fPhone")+'</label><input id="f-phone" value="'+esc(c.phone)+'"></div></div>' +
    '<label>'+t("fAddress")+'</label><input id="f-address" value="'+esc(c.address)+'">' +
    '<label>'+t("fWebsite")+'</label><input id="f-website" value="'+esc(c.website)+'">' +
    '<label>'+t("fDescription")+'</label><textarea id="f-description">'+esc(c.description)+'</textarea>' +
    '<div class="rowbtns"><button id="save">'+t("save")+'</button>' +
      '<button class="ghost" id="score-one">'+t("rescore")+'</button><span class="msg" id="msg"></span></div>' +
    (a ? '<div class="assess"><div class="t">'+t("buyIntent")+'</div>' +
      '<div class="big" style="color:'+chColor(a.intent_score)+'">'+a.intent_score+'<span class="t" style="font-size:13px"> / '+t("successRate")+' '+a.success_probability+'</span></div>' +
      '<div style="margin:6px 0"><b>'+esc(t("ch_"+a.recommended_channel)||a.recommended_channel)+'</b> · '+esc(a.budget_estimate)+'</div>' +
      '<div class="t">'+esc(a.reasoning)+'</div><div class="t" style="margin-top:6px">'+t("model")+': '+esc(a.model)+'</div></div>'
      : '<div class="assess t">'+t("notScored")+'</div>') +
    '<label>'+t("contactsLabel")+'</label><div id="contacts"></div>' +
    '<div class="assess"><div class="grid2"><input id="ct-name" placeholder="'+t("ctName")+'"><input id="ct-role" placeholder="'+t("ctRole")+'"></div>' +
      '<div class="grid2" style="margin-top:8px"><input id="ct-email" placeholder="'+t("ctEmail")+'"><input id="ct-phone" placeholder="'+t("ctPhone")+'"></div>' +
      '<div class="grid2" style="margin-top:8px"><input id="ct-line" placeholder="'+t("ctLine")+'"><input id="ct-tg" placeholder="'+t("ctTelegram")+'"></div>' +
      '<button style="margin-top:8px" id="add-contact">'+t("addContact")+'</button></div>';

  renderContacts(d.contacts);
  $("save").onclick = async () => {
    await api("/api/companies/"+id, { method:"PATCH", headers:{"content-type":"application/json"},
      body: JSON.stringify({ name: val("f-name"), type: $("f-type").value, status: $("f-status").value,
        area: val("f-area"), phone: val("f-phone"), address: val("f-address"),
        website: val("f-website"), description: val("f-description") }) });
    $("msg").textContent = t("saved"); loadList();
  };
  $("score-one").onclick = async () => {
    $("msg").textContent = t("scoringDots");
    await api("/api/companies/"+id+"/score", { method:"POST" });
    openDetail(id); loadList(); loadStats();
  };
  $("add-contact").onclick = async () => {
    await api("/api/companies/"+id+"/contacts", { method:"POST", headers:{"content-type":"application/json"},
      body: JSON.stringify({ name: val("ct-name"), role: val("ct-role"), email: val("ct-email"),
        phone: val("ct-phone"), line_id: val("ct-line"), telegram: val("ct-tg"), source: "manual" }) });
    openDetail(id); loadList(); loadStats();
  };
  loadList();
}

function renderContacts(list) {
  const box = $("contacts");
  box.innerHTML = list.length ? "" : '<div class="t">'+t("noContacts")+'</div>';
  for (const c of list) {
    const el = document.createElement("div"); el.className = "contact";
    el.innerHTML = "<div><b>"+esc(c.name || "—")+"</b> <small>"+esc(c.role || "")+"</small><br>" +
      "<small>"+[c.email, c.phone, c.line_id && ("Line:"+c.line_id), c.telegram && ("TG:"+c.telegram)]
        .filter(Boolean).map(esc).join(" · ")+"</small></div>" +
      '<button class="del" data-id="'+c.id+'">'+t("del")+'</button>';
    el.querySelector(".del").onclick = async () => {
      await api("/api/contacts/"+c.id, { method:"DELETE" }); openDetail(selected); loadStats();
    };
    box.appendChild(el);
  }
}

$("score-all").onclick = async () => {
  const rows = await api("/api/companies").then(r => r.json());
  const todo = rows.filter(r => r.intent_score == null);
  let i = 0;
  for (const r of todo) {
    $("score-all").textContent = t("scoring")+" "+(++i)+"/"+todo.length;
    await api("/api/companies/"+r.id+"/score", { method:"POST" }); loadList();
  }
  $("score-all").textContent = t("scoreAll"); loadStats();
};

// ---------- admin: grants ----------
$("btn-admin").onclick = () => { $("admin").classList.remove("hidden"); loadGrants(); };
$("grants-close").onclick = () => $("admin").classList.add("hidden");
$("g-create").onclick = async () => {
  const r = await api("/api/grants", { method:"POST", headers:{"content-type":"application/json"},
    body: JSON.stringify({ label: val("g-label"), days: Number($("g-days").value) || 7 }) });
  const d = await r.json();
  $("g-code-box").classList.remove("hidden");
  $("g-code-once").textContent = t("codeOnce");
  $("g-code").textContent = d.code;
  $("g-label").value = "";
  loadGrants();
};
async function loadGrants() {
  const rows = await api("/api/grants").then(r => r.json());
  const tb = $("grant-rows");
  tb.innerHTML = rows.length ? "" : '<tr><td colspan="4" class="t">'+t("noGrants")+'</td></tr>';
  for (const g of rows) {
    const st = g.revoked ? t("stRevoked") : (g.active ? t("stActive") : t("stExpired"));
    const color = g.active ? "var(--good)" : "var(--muted)";
    const tr = document.createElement("tr");
    tr.innerHTML = "<td>"+esc(g.label || "—")+"</td>" +
      '<td class="t">'+esc((g.expires_at||"").slice(0,10))+"</td>" +
      '<td style="color:'+color+'">'+st+"</td>" +
      "<td>"+(g.active ? '<button class="del" data-id="'+g.id+'">'+t("revoke")+"</button>" : "")+"</td>";
    const btn = tr.querySelector(".del");
    if (btn) btn.onclick = async () => { await api("/api/grants/"+g.id+"/revoke", { method:"POST" }); loadGrants(); };
    tb.appendChild(tr);
  }
}

// ---------- boot ----------
(async function boot() {
  const cfg = await fetch("/api/config").then(r => r.json()).catch(() => ({ default_lang: "en" }));
  if (!localStorage.getItem("psm_lang")) LANG = cfg.default_lang || "en";
  document.documentElement.lang = LANG;
  fillLangSelects(); applyStaticText();
  const me = await fetch("/api/me").then(r => r.ok ? r.json() : null);
  if (me) enterApp(); else showLogin();
})();
</script>
